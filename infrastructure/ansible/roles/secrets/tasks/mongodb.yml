# MongoDB secrets management

- name: Create MongoDB namespace
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: mongodb-system

- name: Create MongoDB Kubernetes Secret
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: mongodb-root-user-credentials
        namespace: mongodb-system
      type: Opaque
      data:
        username: "{{ secrets_vault_mongodb_root_username | b64encode | default('root' | b64encode) }}"
        password: "{{ secrets_vault_mongodb_root_password | b64encode }}"
  no_log: true
