---
- name: Bootstrap Local Kubernetes Environment
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    minikube_cpus: "{{ lookup('env', 'MINIKUBE_CPUS') | default('4', true) }}"
    minikube_memory: "{{ lookup('env', 'MINIKUBE_MEMORY') | default('7800mb', true) }}"
    deploy_environment: "{{ lookup('env', 'TF_VAR_environment') | default('local', true) }}"
    ingress_host: "{{ 'dev.kino.com' if deploy_environment == 'dev' else 'local.kino.com' }}"
    terraform_dir: "{{ playbook_dir }}"

  tasks:
    - name: Check for required tools
      ansible.builtin.command: "which {{ item }}"
      loop:
        - kubectl
        - helm
        - minikube
        - terraform
      register: tool_check
      failed_when: tool_check.rc != 0
      changed_when: false

    - name: Check Minikube status
      ansible.builtin.command: minikube status
      register: minikube_status
      failed_when: false
      changed_when: false

    - name: Start Minikube
      ansible.builtin.command: >-
        minikube start --cpus={{ minikube_cpus }} --memory={{ minikube_memory }}
      register: minikube_start
      when: "'host: Running' not in minikube_status.stdout"
      changed_when: "'Done!' in minikube_start.stdout"

    - name: Enable Ingress Addon
      ansible.builtin.command: minikube addons enable ingress
      register: ingress_enable
      changed_when: "'The \\'ingress\\' addon is enabled' not in ingress_enable.stdout"

    - name: Get Minikube IP
      ansible.builtin.command: minikube ip
      register: minikube_ip
      changed_when: false

    - name: Update /etc/hosts for local.kino.com
      become: true
      ansible.builtin.lineinfile:
        path: /etc/hosts
        line: "{{ minikube_ip.stdout }} local.kino.com"
        regexp: ".*local\\.kino\\.com"
        state: present

    - name: Update /etc/hosts for dev.kino.com
      become: true
      ansible.builtin.lineinfile:
        path: /etc/hosts
        line: "{{ minikube_ip.stdout }} dev.kino.com"
        regexp: ".*dev\\.kino\\.com"
        state: present

    - name: Initialize Terraform
      ansible.builtin.command: terraform init
      args:
        chdir: "{{ terraform_dir }}"
      register: tf_init
      changed_when: "'Terraform has been successfully initialized' in tf_init.stdout"

    - name: Apply Terraform
      ansible.builtin.command: terraform apply -auto-approve
      args:
        chdir: "{{ playbook_dir }}"
      register: terraform_result
      retries: 3
      delay: 10
      until: terraform_result is success
      changed_when: "'Apply complete' in terraform_result.stdout"

    - name: Fail if Terraform Apply failed
      ansible.builtin.fail:
        msg: "Terraform apply failed after retries."
      when: terraform_result is failed

    - name: Wait for auth-service machine token endpoint
      ansible.builtin.uri:
        url: "http://{{ ingress_host }}/api/v1/auth/oauth2/token"
        method: POST
        force_basic_auth: true
        user: "agent-service"
        password: "{{ lookup('env', 'TF_VAR_agent_service_client_secret') | default('replace-me-agent-secret', true) }}"
        body_format: form-urlencoded
        body:
          grant_type: client_credentials
        status_code: 200
        return_content: true
      register: token_result
      until: token_result.status == 200
      retries: 30
      delay: 5
      failed_when: false

    - name: Set machine access token
      ansible.builtin.set_fact:
        machine_access_token: "{{ token_result.json.access_token }}"
      when: token_result.status == 200

    - name: Wait for data-service internal search route
      ansible.builtin.uri:
        url: "http://{{ ingress_host }}/api/v1/data/internal/titles/search?page=0&size=1&isAdult=false"
        headers:
          Authorization: "Bearer {{ machine_access_token }}"
        status_code: 200
        return_content: false
      register: result
      until: result.status == 200
      retries: 30
      delay: 5
      failed_when: false
      when: token_result.status == 200

    - name: Warm up Kafka topics (Trigger Search)
      ansible.builtin.uri:
        url: "http://{{ ingress_host }}/api/v1/data/internal/titles/search?page=0&size=1&isAdult=false"
        method: GET
        headers:
          Authorization: "Bearer {{ machine_access_token }}"
        status_code: 200
      when:
        - token_result.status == 200
        - result.status == 200
