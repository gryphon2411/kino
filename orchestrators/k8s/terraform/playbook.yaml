---
- name: Bootstrap Local Kubernetes Environment
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    minikube_cpus: max
    minikube_memory: max
    terraform_dir: "{{ playbook_dir }}"

  tasks:
    - name: Check for required tools
      ansible.builtin.command: "which {{ item }}"
      loop:
        - kubectl
        - helm
        - minikube
        - terraform
      register: tool_check
      failed_when: tool_check.rc != 0
      changed_when: false

    - name: Check Minikube status
      ansible.builtin.command: minikube status
      register: minikube_status
      failed_when: false
      changed_when: false

    - name: Start Minikube
      ansible.builtin.command: >-
        minikube start --cpus={{ minikube_cpus }} --memory={{ minikube_memory }}
      register: minikube_start
      when: "'host: Running' not in minikube_status.stdout"
      changed_when: "'Done!' in minikube_start.stdout"

    - name: Enable Ingress Addon
      ansible.builtin.command: minikube addons enable ingress
      register: ingress_enable
      changed_when: "'The \\'ingress\\' addon is enabled' not in ingress_enable.stdout"

    - name: Get Minikube IP
      ansible.builtin.command: minikube ip
      register: minikube_ip
      changed_when: false

    - name: Update /etc/hosts for local.derkino.com
      become: true
      ansible.builtin.lineinfile:
        path: /etc/hosts
        line: "{{ minikube_ip.stdout }} local.derkino.com"
        regexp: ".*local\\.derkino\\.com"
        state: present

    - name: Update /etc/hosts for dev.derkino.com
      become: true
      ansible.builtin.lineinfile:
        path: /etc/hosts
        line: "{{ minikube_ip.stdout }} dev.derkino.com"
        regexp: ".*dev\\.derkino\\.com"
        state: present

    - name: Initialize Terraform
      ansible.builtin.command: terraform init
      args:
        chdir: "{{ terraform_dir }}"
      register: tf_init
      changed_when: "'Terraform has been successfully initialized' in tf_init.stdout"

    - name: Clean up orphaned generative-service (Pre-flight)
      block:
        - name: Remove generative-service from Terraform state (if orphaned)
          ansible.builtin.shell:
            cmd: terraform state rm 'kubernetes_deployment.generative_service[0]' 2>/dev/null || true
            chdir: "{{ terraform_dir }}"
          changed_when: false
          failed_when: false

        - name: Delete generative-service deployment from K8s (if orphaned)
          ansible.builtin.command: kubectl delete deployment generative-service --ignore-not-found=true
          changed_when: false

    - name: Apply Terraform
      ansible.builtin.command: terraform apply -auto-approve
      args:
        chdir: "{{ playbook_dir }}"
      environment:
        TF_LOG: DEBUG
        TF_LOG_PATH: "{{ playbook_dir }}/terraform-debug.log"
      register: terraform_result
      retries: 3
      delay: 10
      until: terraform_result is success
      changed_when: "'Apply complete' in terraform_result.stdout"

    - name: Debug Terraform Output
      ansible.builtin.debug:
        var: terraform_result.stdout_lines

    - name: Fail if Terraform Apply failed
      ansible.builtin.fail:
        msg: "Terraform apply failed after retries. Check terraform-debug.log for details."
      when: terraform_result is failed

    - name: Get MongoDB Password
      ansible.builtin.command: >-
        kubectl get secret -n mongodb-system mongodb-root-user-credentials
        -o jsonpath='{.data.password}'
      register: mongodb_pass_b64
      changed_when: false

    - name: Fetch valid Title ID for Warmup
      ansible.builtin.command: >-
        kubectl exec -n mongodb-system mongodb-0 --
        mongosh derkino -u root -p {{ mongodb_pass_b64.stdout | b64decode }}
        --authenticationDatabase admin --quiet
        --eval "db.title_basics.findOne({},{_id:1})._id.toString()"
      register: mongo_id_output
      changed_when: false

    - name: Parse Title ID
      ansible.builtin.set_fact:
        title_id: "{{ mongo_id_output.stdout | trim }}"

    - name: Wait for Data Service
      ansible.builtin.uri:
        url: "http://local.derkino.com/api/v1/data/titles/{{ title_id }}"
        status_code: 200
        return_content: false
      register: result
      until: result.status == 200
      retries: 30
      delay: 5
      failed_when: false

    - name: Warm up Kafka topics (Trigger Search)
      ansible.builtin.uri:
        url: "http://local.derkino.com/api/v1/data/titles/{{ title_id }}"
        method: GET
        status_code: 200
      when: result.status == 200
