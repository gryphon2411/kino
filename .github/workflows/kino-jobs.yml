# The name of this workflow.
name: kino jobs ci

# Run validation on pushes and PRs.
# Local Linux release tasks are the authoritative path for publishing official
# title dataset artifacts, so this workflow never promotes raw/curated/seed
# images to a registry.
on:
  # Specifies that this workflow should run on every push event for the
  # branches in the list, but only when the jobs code or this workflow changed.
  push:
    branches:
      - master
    paths:
      - jobs/**
      - .github/workflows/kino-jobs.yml
  # Specifies that this workflow should run on every pull request event
  # targeting the branches in the list, with the same path filter as `push`.
  pull_request:
    branches:
      - master
    paths:
      - jobs/**
      - .github/workflows/kino-jobs.yml
  # Allows an operator to run the workflow manually from the Actions tab.
  workflow_dispatch:
    inputs:
      publish_image:
        description: Publish the runtime jobs image from the selected ref. Publishing still requires refs/heads/master.
        required: true
        default: false
        type: boolean

# Prevent overlapping runs of this same workflow on the same ref, so two executions do not race to push the same runtime image tag or report competing digests.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Shared workflow variables keep repeated values in one place.
env:
  PYTHON_VERSION: "3.10"
  JOBS_DIR: jobs
  RUNTIME_IMAGE_NAME: kino-jobs
  RUNTIME_PUBLISH_REF: refs/heads/master
  RUNTIME_IMAGE_TAG: kino-jobs:ci
  VERIFY_RAW_TAG: kino-title-raw:verify
  VERIFY_CURATED_TAG: kino-title-curated:verify
  VERIFY_SEED_TAG: kino-mongo-seed:verify

# This workflow is split into two layers:
# 1. `build` verifies the jobs code and only pushes the runtime image from merged `master` or explicit manual publish on `master`.
# 2. `verify_title_artifacts` proves the raw/curated/seed pipeline and OCI packaging still work, using a committed tiny fixture dataset.
jobs:
  # Creates a job ID (`build`) and declares the type of machine that the job
  # should run on.
  build:
    runs-on: ubuntu-latest
    steps:
      # Check out the repository on the runner.
      - name: Checkout
        uses: actions/checkout@v5

      # Match the Python version used by the jobs image and local analysis environment.
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Install the pinned jobs dependencies before running tests.
      - name: Install jobs dependencies
        run: pip install -r jobs/requirements.txt

      # Run the pipeline unit/integration tests on every workflow invocation.
      - name: Run jobs tests
        run: python -m unittest discover -s jobs/tests -p 'test_*.py'

      # Decide once whether this run is allowed to publish or should stay in validation mode.
      - name: Decide publish mode
        id: publish_decision
        run: |
          should_publish=false
          non_publish_reason="This run will validate only."
          publish_requested="$(python3 -c 'import json, sys; event = json.load(open(sys.argv[1])); print(str(event.get("inputs", {}).get("publish_image", "false")).lower())' "$GITHUB_EVENT_PATH")"

          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "${{ env.RUNTIME_PUBLISH_REF }}" ]]; then
            should_publish=true
            non_publish_reason=""
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "$publish_requested" == "true" && "${{ github.ref }}" == "${{ env.RUNTIME_PUBLISH_REF }}" ]]; then
            should_publish=true
            non_publish_reason=""
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "$publish_requested" != "true" ]]; then
            non_publish_reason="publish_image=false"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.ref }}" != "${{ env.RUNTIME_PUBLISH_REF }}" ]]; then
            non_publish_reason="selected ref does not match ${{ env.RUNTIME_PUBLISH_REF }}"
          fi

          {
            echo "should_publish=$should_publish"
            echo "non_publish_reason<<EOF"
            echo "$non_publish_reason"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # Docker Hub credentials are only needed when this run is actually allowed to publish `kino-jobs:latest`.
      - name: Login to Docker Hub
        if: steps.publish_decision.outputs.should_publish == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Buildx is used consistently for both CI-only image builds and published images.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # PRs and non-publishing manual runs build the jobs image locally to validate the Dockerfile without mutating the registry.
      - name: Build jobs image for CI
        if: steps.publish_decision.outputs.should_publish != 'true'
        uses: docker/build-push-action@v7
        with:
          # The build context is the `jobs/` directory.
          context: ${{ env.JOBS_DIR }}
          # Filepath to the Dockerfile relative to the repository root.
          file: jobs/Dockerfile
          # CI-only validation builds stay local to the runner.
          push: false
          # Local tag used only inside the CI runner.
          tags: ${{ env.RUNTIME_IMAGE_TAG }}

      # Manual runs that stay in validation mode still explain why no runtime image publish happened.
      - name: Publish validation summary
        if: github.event_name == 'workflow_dispatch' && steps.publish_decision.outputs.should_publish != 'true'
        run: |
          {
            echo "## Validation-only run"
            echo
            echo "- Ref: \`${{ github.ref }}\`"
            echo "- Publish requested: \`${{ inputs.publish_image }}\`"
            echo "- Reason: ${{ steps.publish_decision.outputs.non_publish_reason }}"
          } >> "$GITHUB_STEP_SUMMARY"

      # Canonical branch pushes and explicit manual publishes on that branch are allowed to refresh the mutable runtime tag.
      - name: Build and push jobs image
        if: steps.publish_decision.outputs.should_publish == 'true'
        id: publish_image
        uses: docker/build-push-action@v7
        with:
          # The build context is the `jobs/` directory.
          context: ${{ env.JOBS_DIR }}
          # Filepath to the Dockerfile relative to the repository root.
          file: jobs/Dockerfile
          # Tells the action to upload the image to Docker Hub after building it.
          push: true
          # Tags specify where the pushed image should live.
          tags: ${{ vars.DOCKERHUB_USERNAME }}/${{ env.RUNTIME_IMAGE_NAME }}:latest

      # Build a small runtime release manifest so operators can copy the exact image ref later.
      - name: Write runtime release manifest
        if: steps.publish_decision.outputs.should_publish == 'true'
        id: runtime_release_manifest
        run: |
          python3 .github/scripts/write_image_release_manifest.py \
            --service jobs-runtime \
            --repository "${{ vars.DOCKERHUB_USERNAME }}/${{ env.RUNTIME_IMAGE_NAME }}" \
            --tag latest \
            --digest "${{ steps.publish_image.outputs.digest }}" \
            --git-revision "${{ github.sha }}" \
            --git-ref "${{ github.ref }}" \
            --git-commit-subject "$(git log -1 --pretty=%s)" \
            --workflow "${{ github.workflow }}" \
            --output runtime-release-manifest.json

      # Surface the runtime image ref directly on the run summary page.
      - name: Publish runtime workflow summary
        if: steps.publish_decision.outputs.should_publish == 'true'
        run: |
          {
            echo "## Published jobs runtime image"
            echo
            echo "- Commit: \`${{ steps.runtime_release_manifest.outputs.short_git_revision }}\` ${{ steps.runtime_release_manifest.outputs.git_commit_subject }}"
            echo "- Ref: \`${{ github.ref }}\`"
            echo "- Image ref: \`${{ steps.runtime_release_manifest.outputs.image_ref }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      # Upload the runtime release manifest separately so it cannot be confused with the dataset verification manifest.
      - name: Upload runtime release manifest
        if: steps.publish_decision.outputs.should_publish == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: kino-jobs-runtime-release-manifest
          path: runtime-release-manifest.json

  # This job runs automatically on matching pushes/PRs, but only after `build` passes.
  # It exists to validate the IMDb titles artifact pipeline shape and Docker packaging,
  # not to publish official dataset artifacts.
  verify_title_artifacts:
    # Requires the `build` job to pass first.
    needs: build
    runs-on: ubuntu-latest
    # Job-level `run` defaults apply to every shell command in this job unless a
    # specific step overrides them. Here that means `run:` steps execute with
    # `bash` and start from the `jobs/` directory, so we do not repeat those
    # settings on each step.
    defaults:
      run:
        shell: bash
        working-directory: jobs
    steps:
      # Rebuild the title artifacts from a deterministic tiny raw fixture so the
      # pipeline shape and packaging stay validated without depending on live IMDb.
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install jobs dependencies
        run: pip install -r requirements.txt

      # Copy the committed raw fixture into the local artifact workspace and run
      # the same curated and seed build commands used by the real release flow.
      - name: Build curated and seed artifacts from fixture raw input
        run: |
          rm -rf .artifacts
          mkdir -p .artifacts
          cp -R tests/fixtures/raw-imdb .artifacts/raw-imdb
          python -m imdb_titles_pipeline build-curated-titles --raw-dir .artifacts/raw-imdb --output-dir .artifacts/curated-titles
          python -m imdb_titles_pipeline build-mongo-seed --curated-dir .artifacts/curated-titles --output-dir .artifacts/mongo-seed

      # Capture the immutable identifiers that are embedded into OCI labels and the CI verification manifest.
      - name: Read artifact metadata
        id: artifact_metadata
        # A small Python helper keeps the YAML focused on orchestration instead
        # of embedding metadata extraction logic inline.
        run: python -m imdb_titles_pipeline.release.metadata >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Build the raw snapshot image without pushing it so Dockerfile packaging
      # stays tested on PRs even though local release is authoritative.
      - name: Verify raw snapshot image packaging
        uses: docker/build-push-action@v7
        with:
          # The build context is the `jobs/` directory.
          context: ${{ env.JOBS_DIR }}
          # Filepath to the Dockerfile relative to the repository root.
          file: jobs/images/raw-imdb/Dockerfile
          # Verification builds stay local to the runner.
          push: false
          # Local tag used only inside CI to prove the image can be assembled.
          tags: ${{ env.VERIFY_RAW_TAG }}
          build-args: |
            DATASET_VERSION=${{ steps.artifact_metadata.outputs.dataset_version }}
            MANIFEST_SHA256=${{ steps.artifact_metadata.outputs.raw_manifest_sha256 }}
            SOURCE_SHA256=${{ steps.artifact_metadata.outputs.raw_source_sha256 }}

      # Build the curated artifact image locally to validate labels, copy paths, and manifest wiring.
      - name: Verify curated titles image packaging
        uses: docker/build-push-action@v7
        with:
          # The build context is the `jobs/` directory.
          context: ${{ env.JOBS_DIR }}
          # Filepath to the Dockerfile relative to the repository root.
          file: jobs/images/curated-titles/Dockerfile
          # Verification builds stay local to the runner.
          push: false
          # Local tag used only inside CI to prove the image can be assembled.
          tags: ${{ env.VERIFY_CURATED_TAG }}
          build-args: |
            DATASET_VERSION=${{ steps.artifact_metadata.outputs.dataset_version }}
            MANIFEST_SHA256=${{ steps.artifact_metadata.outputs.curated_manifest_sha256 }}
            SOURCE_SHA256=${{ steps.artifact_metadata.outputs.raw_source_sha256 }}
            TRANSFORM_VERSION=${{ steps.artifact_metadata.outputs.transform_version }}

      # Build the Mongo seed image locally so release-only packaging issues are caught pre-merge.
      - name: Verify Mongo seed image packaging
        uses: docker/build-push-action@v7
        with:
          # The build context is the `jobs/` directory.
          context: ${{ env.JOBS_DIR }}
          # Filepath to the Dockerfile relative to the repository root.
          file: jobs/images/mongo-seed/Dockerfile
          # Verification builds stay local to the runner.
          push: false
          # Local tag used only inside CI to prove the image can be assembled.
          tags: ${{ env.VERIFY_SEED_TAG }}
          build-args: |
            DATASET_VERSION=${{ steps.artifact_metadata.outputs.dataset_version }}
            MANIFEST_SHA256=${{ steps.artifact_metadata.outputs.seed_manifest_sha256 }}
            SOURCE_SHA256=${{ steps.artifact_metadata.outputs.raw_source_sha256 }}
            TRANSFORM_VERSION=${{ steps.artifact_metadata.outputs.transform_version }}

      # Persist a lightweight verification manifest for audit/debugging, without publishing any registry artifacts.
      - name: Write verification manifest
        run: |
          cat > .artifacts/release-manifest.json <<EOF
          {
            "gitRevision": "${{ github.sha }}",
            "datasetVersion": "${{ steps.artifact_metadata.outputs.dataset_version }}",
            "transformVersion": "${{ steps.artifact_metadata.outputs.transform_version }}",
            "rawSourceSha256": "${{ steps.artifact_metadata.outputs.raw_source_sha256 }}",
            "rawManifestSha256": "${{ steps.artifact_metadata.outputs.raw_manifest_sha256 }}",
            "curatedManifestSha256": "${{ steps.artifact_metadata.outputs.curated_manifest_sha256 }}",
            "seedManifestSha256": "${{ steps.artifact_metadata.outputs.seed_manifest_sha256 }}",
            "seedDocuments": "${{ steps.artifact_metadata.outputs.seed_documents }}"
          }
          EOF

      # Upload the verification manifest so reviewers/operators can inspect the derived dataset identity from CI.
      - name: Upload verification manifest
        uses: actions/upload-artifact@v6
        with:
          name: title-artifact-verification-manifest
          path: jobs/.artifacts/release-manifest.json
