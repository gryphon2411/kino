# The name of this workflow.
name: kino agent service ci

# Specifies when this workflow should run.
on:
  push:
    branches:
      - master
    paths:
      - services/langgraph/agent_service/**
      - .github/workflows/kino-agent-service.yaml
  pull_request:
    branches:
      - master
    paths:
      - services/langgraph/agent_service/**
      - .github/workflows/kino-agent-service.yaml

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/langgraph/agent_service

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Check formatting
        run: python -m ruff format --check .

      - name: Lint
        run: python -m ruff check .

      - name: Validate LangGraph config with Gemini
        run: langgraph validate

      - name: Validate LangGraph config with DeepSeek on NVIDIA NIM
        env:
          KINO_CURATOR_PROVIDER: nvidia_nim
          KINO_CURATOR_MODEL: deepseek-ai/deepseek-v3.2
          NVIDIA_API_KEY: nvapi-test
        run: langgraph validate

      - name: Validate LangGraph config with Kimi on NVIDIA NIM
        env:
          KINO_CURATOR_PROVIDER: nvidia_nim
          KINO_CURATOR_MODEL: moonshotai/kimi-k2.5
          NVIDIA_API_KEY: nvapi-test
        run: langgraph validate

      - name: Run tests
        run: python -m pytest tests/unit_tests tests/integration_tests

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: services/langgraph/agent_service
          file: services/langgraph/agent_service/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/kino-agent_service:latest
